name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Install CPU-only torch first so the subsequent `pip install -e .`
      # resolution sees torch as already satisfied and skips the CUDA wheel
      # stack (cublas, cudnn, nccl, etc.) — ~3.5 GB we don't need on the
      # CI runner. GitHub Actions runners only have ~14 GB free disk.
      - name: Install CPU-only torch
        run: pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1,<3.0" "torchvision"

      - name: Install dev + data deps
        run: pip install -e ".[dev,data]"

      - name: Lint
        run: ruff check src tests

      - name: Unit tests (skip integration)
        run: pytest -m "not integration" -v
